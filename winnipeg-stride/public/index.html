<!DOCTYPE html>
<html lang="en" style="height:100%">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
  <title>Winnipeg Stride</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Phone bezel */
    .phone-frame {
      position: relative;
      width: 393px;
      height: 852px;
      background: #000;
      border-radius: 50px;
      padding: 12px;
      box-shadow:
        0 0 0 2px #333,
        0 0 0 5px #1a1a1a,
        0 20px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(61,91,167,0.15);
    }

    /* Dynamic Island */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10000;
    }

    /* Camera dot */
    .phone-frame::after {
      content: '';
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(30px);
      width: 10px;
      height: 10px;
      background: #1a1a2e;
      border-radius: 50%;
      z-index: 10001;
      border: 2px solid #222;
    }

    /* Screen area — this is the key fix: display:flex so #root fills it */
    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 40px;
      overflow: hidden;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    /* Expo app root — must stretch to fill the screen */
    #root {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* React Native Web needs flex propagated deeply */
    #root div[data-testid],
    #root > div,
    #root > div > div,
    #root > div > div > div,
    #root > div > div > div > div {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    /* Tab bar row should not grow */
    [role="tablist"] {
      flex: 0 !important;
      flex-shrink: 0 !important;
    }

    /* Header should not grow */
    header, [role="banner"] {
      flex: 0 !important;
      flex-shrink: 0 !important;
    }

    /* Side buttons */
    .btn-power {
      position: absolute;
      right: -3px;
      top: 180px;
      width: 3px;
      height: 80px;
      background: #333;
      border-radius: 0 2px 2px 0;
    }
    .btn-vol-up {
      position: absolute;
      left: -3px;
      top: 160px;
      width: 3px;
      height: 50px;
      background: #333;
      border-radius: 2px 0 0 2px;
    }
    .btn-vol-down {
      position: absolute;
      left: -3px;
      top: 220px;
      width: 3px;
      height: 50px;
      background: #333;
      border-radius: 2px 0 0 2px;
    }

    /* Home indicator */
    .home-indicator {
      width: 134px;
      height: 5px;
      background: rgba(0,0,0,0.18);
      border-radius: 3px;
      margin: 6px auto 8px;
      flex-shrink: 0;
    }

    /* Label under phone */
    .device-label {
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    /* Responsive: shrink on small viewports */
    @media (max-height: 920px) {
      .phone-frame { transform: scale(0.85); transform-origin: center center; }
    }
    @media (max-height: 780px) {
      .phone-frame { transform: scale(0.72); }
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="btn-power"></div>
    <div class="btn-vol-up"></div>
    <div class="btn-vol-down"></div>
    <div class="phone-screen">
      <div id="root"></div>
      <div class="home-indicator"></div>
    </div>
    <div class="device-label">Winnipeg Stride — iPhone 15 Pro</div>
  </div>
</body>
</html>
